<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ピコピコ！ハフマン符号＆ツリーシミュレーター</title>
    <style>
        /* ポップで明るいデザインのベース設定 */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            background-color: #fff0f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #7209b7;
            font-size: 1.8rem;
            text-shadow: 2px 2px 0px #fff, 4px 4px 0px #e0b1f5;
            margin-bottom: 10px;
            text-align: center;
        }

        .description {
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 0px #ddd;
            margin-bottom: 20px;
            font-size: 0.9rem;
            max-width: 700px;
            text-align: center;
            border: 2px solid #333;
        }

        /* メインコンテナ（上部は左右2列、下部は1列にするため、まずは縦並びのベースを定義） */
        .main-wrapper {
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-width: 1100px;
            width: 100%;
        }

        /* 上部エリア（Flexboxで2列/1列を切り替え） */
        .top-container {
            display: flex;
            flex-direction: row;
            gap: 25px;
            align-items: flex-start;
            width: 100%;
        }

        /* 左側：入力エリア */
        .input-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1;
        }

        /* 右側：解析結果エリア */
        .results-area {
            display: flex;
            flex-direction: column;
            width: 100%;
            flex: 1.2;
        }

        /* 下部：ツリー表示エリア（横幅いっぱい） */
        .tree-area {
            width: 100%;
        }

        /* 各種共通ボックス */
        .panel {
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 8px 0px #e0b1f5;
            border: 3px solid #333;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            height: 90px;
            padding: 15px;
            font-size: 1.1rem;
            border: 3px solid #333;
            border-radius: 15px;
            box-sizing: border-box;
            resize: none;
            font-weight: bold;
            font-family: monospace;
            background-color: #fdfaf6;
        }

        textarea:focus {
            outline: none;
            border-color: #7209b7;
        }

        .result-box {
            background: #fcf4ff;
            border: 2px solid #333;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .result-box h3, .panel h3 {
            margin: 0 0 10px 0;
            font-size: 1rem;
            color: #333;
            display: inline-block;
            background: #f72585;
            color: white;
            padding: 4px 12px;
            border-radius: 10px;
            border: 1px solid #333;
        }

        .code-display {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 1.1rem;
            word-break: break-all;
            color: #222;
            background: white;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            min-height: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .stat-card {
            background: white;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-val {
            font-size: 1.4rem;
            font-weight: bold;
            color: #7209b7;
        }

        /* 登場頻度リスト（簡易グラフ風） */
        .freq-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ccc;
            max-height: 200px;
            overflow-y: auto;
        }

        .freq-row {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 5px 10px;
        }

        .freq-char {
            font-family: monospace;
            font-weight: bold;
            width: 50px;
        }

        .freq-bar-container {
            flex: 1;
            background: #f0f0f0;
            height: 14px;
            border-radius: 8px;
            margin: 0 15px;
            overflow: hidden;
        }

        .freq-bar {
            background: #4cc9f0;
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s;
        }

        .freq-code {
            font-family: monospace;
            font-weight: bold;
            color: #f72585;
            width: 80px;
            text-align: right;
        }

        .clear-btn {
            background-color: #4cc9f0;
            color: white;
            border: 2px solid #333;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #333;
            margin-top: 10px;
            align-self: center;
        }
        .clear-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* キャンバスの設定 */
        .canvas-container {
            width: 100%;
            overflow-x: auto;
            background: #f8f9fa;
            border: 2px dashed #7209b7;
            border-radius: 15px;
            margin-top: 10px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: #fff;
        }

        /* 画面サイズが768px以下の場合のレスポンシブ設定 */
        @media (max-width: 768px) {
            .top-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <h1>ハフマン符号＆ツリー</h1>
    
    <div class="description">
        英語のメッセージを入力すると、下に**ハフマンツリー（木構造）**が自動で組み立てられるよ！<br>
        🌳上から枝（0と1）をたどって、文字の暗号ができあがる様子を見てみよう。
    </div>

    <div class="main-wrapper">
        <div class="top-container">
            
            <div class="input-area panel">
                <h3>入力メッセージ（半角英数）</h3>
                <textarea id="text-input" oninput="processHuffman()">HELLO WORLD, WELCOME TO INFORMATION CLASS!</textarea>
                <button class="clear-btn" onclick="resetText()">元の文章に戻す</button>
                
                <div class="result-box" style="margin-top: 20px; margin-bottom: 0;">
                    <h3>圧縮されたビット列</h3>
                    <div id="binary-output" class="code-display" style="font-size: 0.85rem; max-height: 120px; overflow-y: auto;"></div>
                </div>
            </div>

            <div class="results-area panel">
                <h3>データ量の比較</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div>元のデータ量<br><small>(1文字=8bit固定)</small></div>
                        <div id="original-size" class="stat-val">0 bit</div>
                    </div>
                    <div class="stat-card">
                        <div>ハフマン圧縮後</div>
                        <div id="compressed-size" class="stat-val">0 bit</div>
                    </div>
                </div>
                <div id="compression-ratio" style="text-align: center; font-weight: bold; color: #f72585; margin-bottom: 15px; font-size: 0.9rem;"></div>

                <h3>文字ごとの登場回数と符号</h3>
                <div id="freq-list"></div>
            </div>

        </div>

        <div class="tree-area panel">
            <h3>自動生成されたハフマンツリー（木構造）</h3>
            <div style="font-size: 0.85rem; color: #555; margin-bottom: 10px;">
                最上部の丸からスタートして、左の枝なら「0」、右の枝なら「1」を拾いながら下に進むと、その文字の暗号（符号）になります！
            </div>
            <div class="canvas-container">
                <canvas id="tree-canvas" width="900" height="450"></canvas>
            </div>
        </div>
    </div>

    <script>
        const defaultText = "HELLO WORLD, WELCOME TO INFORMATION CLASS!";

        function resetText() {
            document.getElementById('text-input').value = defaultText;
            processHuffman();
        }

        function processHuffman() {
            const text = document.getElementById('text-input').value;
            const canvas = document.getElementById('tree-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!text) {
                document.getElementById('binary-output').innerText = "(文字を入力してください)";
                document.getElementById('original-size').innerText = "0 bit";
                document.getElementById('compressed-size').innerText = "0 bit";
                document.getElementById('compression-ratio').innerText = "";
                document.getElementById('freq-list').innerHTML = "";
                return;
            }

            // 1. 周波数のカウント
            const freqMap = {};
            for (let char of text) {
                freqMap[char] = (freqMap[char] || 0) + 1;
            }

            // 2. 初期ノード（葉）の作成
            let nodes = Object.keys(freqMap).map(char => ({
                char: char,
                freq: freqMap[char],
                left: null,
                right: null
            }));

            // 文字が1種類しか無い場合の特殊処理
            if (nodes.length === 1) {
                const codes = {};
                codes[nodes[0].char] = "0";
                displayResults(text, freqMap, codes);
                drawSingleNodeTree(ctx, nodes[0].char, nodes[0].freq);
                return;
            }

            // 3. ハフマン木の構築
            while (nodes.length > 1) {
                nodes.sort((a, b) => a.freq - b.freq);
                
                const left = nodes.shift();
                const right = nodes.shift();
                
                const parent = {
                    char: null,
                    freq: left.freq + right.freq,
                    left: left,
                    right: right
                };
                nodes.push(parent);
            }

            const root = nodes[0];

            // 4. 符号の割り当て
            const huffmanCodes = {};
            function traverse(node, code) {
                if (node.char !== null) {
                    huffmanCodes[node.char] = code;
                    return;
                }
                traverse(node.left, code + "0");
                traverse(node.right, code + "1");
            }
            traverse(root, "");

            // 結果の数字や表を表示
            displayResults(text, freqMap, huffmanCodes);

            // 5. ツリーの描画
            drawTree(ctx, root, canvas.width / 2, 40, canvas.width / 4, 60);
        }

        function displayResults(text, freqMap, codes) {
            const origSize = text.length * 8;
            let binaryStr = "";
            let compSize = 0;
            for (let char of text) {
                binaryStr += codes[char];
                compSize += codes[char].length;
            }

            document.getElementById('binary-output').innerText = binaryStr;
            document.getElementById('original-size').innerText = `${origSize} bit`;
            document.getElementById('compressed-size').innerText = `${compSize} bit`;

            const ratio = ((compSize / origSize) * 100).toFixed(1);
            document.getElementById('compression-ratio').innerText = `元のデータ量の約 ${ratio} % に圧縮されました！✨`;

            const sortedChars = Object.keys(freqMap).sort((a, b) => freqMap[b] - freqMap[a]);
            const maxFreq = Math.max(...Object.values(freqMap));

            let freqListHtml = '<div class="freq-table">';
            sortedChars.forEach(char => {
                const displayChar = char === " " ? "[space]" : char;
                const freq = freqMap[char];
                const code = codes[char];
                const barWidth = (freq / maxFreq) * 100;

                freqListHtml += `
                    <div class="freq-row">
                        <div class="freq-char">${displayChar}</div>
                        <div style="font-size:0.75rem; color:#666; width:30px;">${freq}回</div>
                        <div class="freq-bar-container">
                            <div class="freq-bar" style="width: ${barWidth}%;"></div>
                        </div>
                        <div class="freq-code">${code}</div>
                    </div>
                `;
            });
            freqListHtml += '</div>';
            document.getElementById('freq-list').innerHTML = freqListHtml;
        }

        // ツリーを描画する関数（再帰呼び出し）
        function drawTree(ctx, node, x, y, hSpace, vSpace) {
            if (!node) return;

            // 子ノードがある場合、先に枝（線）を描画
            if (node.left) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x - hSpace, y + vSpace);
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 枝のラベル「0」
                ctx.fillStyle = "#f72585";
                ctx.font = "bold 14px Arial";
                ctx.fillText("0", x - hSpace / 2 - 10, y + vSpace / 2);

                // 左の子へ進む（階層が下がるごとに横の広がりを狭くする）
                drawTree(ctx, node.left, x - hSpace, y + vSpace, hSpace * 0.5, vSpace);
            }

            if (node.right) {
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + hSpace, y + vSpace);
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 枝のラベル「1」
                ctx.fillStyle = "#4cc9f0";
                ctx.font = "bold 14px Arial";
                ctx.fillText("1", x + hSpace / 2 + 5, y + vSpace / 2);

                // 右の子へ進む
                drawTree(ctx, node.right, x + hSpace, y + vSpace, hSpace * 0.5, vSpace);
            }

            // 現在のノード（丸）の描画
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, 2 * Math.PI);
            
            if (node.char !== null) {
                // 葉ノード（文字が入っている末端）
                ctx.fillStyle = "#4cc9f0"; 
                ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
                ctx.shadowBlur = 4;
                ctx.fill();
                ctx.shadowBlur = 0; // リセット
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 文字の描画
                ctx.fillStyle = "#333";
                ctx.font = "bold 14px monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                const disp = node.char === " " ? "_" : node.char; // スペースは見えやすいようにアンダーバーに
                ctx.fillText(disp, x, y - 2);
                
                // 出現回数を丸の下に小さく表示
                ctx.font = "10px Arial";
                ctx.fillStyle = "#666";
                ctx.fillText(`${node.freq}回`, x, y + 28);
            } else {
                // 中間ノード（合体したポイント）
                ctx.fillStyle = "#fff";
                ctx.fill();
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 2;
                ctx.stroke();

                // 合計回数の数値を中に描画
                ctx.fillStyle = "#7209b7";
                ctx.font = "11px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(node.freq, x, y);
            }
        }

        // 文字が1種類のみの場合の特殊描画
        function drawSingleNodeTree(ctx, char, freq) {
            ctx.beginPath();
            ctx.arc(450, 100, 20, 0, 2 * Math.PI);
            ctx.fillStyle = "#4cc9f0";
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = "#333";
            ctx.font = "bold 16px monospace";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(char === " " ? "[space]" : char, 450, 100);
        }

        // 初期起動
        processHuffman();
    </script>
</body>
</html>
